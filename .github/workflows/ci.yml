name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile package
        shell: pwsh
        run: |
          python -m compileall src/ai22b/talent_foundry

      - name: Static syntax lint
        shell: pwsh
        run: |
          ruff check src tests --select E9,F63,F7,F82

      - name: Run full regression tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -B -m pytest tests -q

  security:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install security dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path runs | Out-Null
          python -m pip install --upgrade pip
          python -m pip install -e ".[security]"

      - name: Run Bandit source scan
        shell: pwsh
        run: |
          python -m bandit -q -r src -c pyproject.toml -f json -o runs/bandit_report.json

      - name: Run pip-audit dependency scan
        shell: pwsh
        run: |
          python -m pip_audit . --skip-editable --format json --output runs/pip_audit_report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: security-reports
          path: runs/*.json

  release-gates:
    name: Public release gates (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs:
      - test
      - security
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install release dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path runs | Out-Null
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build package artifacts
        shell: pwsh
        run: |
          python -m build
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          python -m pip install --force-reinstall $wheel.FullName

      - name: Run release doctors
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m compileall src/ai22b/talent_foundry
          ruff check src tests --select E9,F63,F7,F82
          ai22b-talent-foundry build-llm-connection-profile --llm-engine deterministic_local --output runs/llm_connection_profile.json
          ai22b-talent-foundry doctor-llm-adapters --strict --output runs/llm_adapter_contracts.json
          ai22b-talent-foundry run-chat-runtime-smoke --llm-engine deterministic_local --strict --output runs/chat_runtime_smoke.json
          ai22b-talent-foundry doctor-llm-live-readiness --llm-engine deterministic_local --strict --output-dir runs/llm_live_readiness
          ai22b-talent-foundry audit-public-release-readiness --repo-root . --strict --output runs/public_release_readiness.json
          ai22b-talent-foundry build-source-sbom --repo-root . --output runs/source_sbom.json
          ai22b-talent-foundry doctor-package-install --repo-root . --strict --output runs/package_install_doctor.json
          ai22b-talent-foundry doctor-runtime-contract --repo-root . --strict --output runs/runtime_contract_doctor.json
          ai22b-talent-foundry doctor-first-run --repo-root . --strict --output runs/first_run_doctor.json

      - name: Public repository hygiene
        shell: pwsh
        run: |
          .\scripts\check_public_repo_hygiene.ps1

      - name: Upload public release gate reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: public-release-gate-reports-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            runs/*.json
            runs/llm_live_readiness/**/*.json
